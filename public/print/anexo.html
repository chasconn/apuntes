<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Anexo</title>
<link rel="stylesheet" href="print.css">
</head>
<body>
<div class="toolbar">
  <span class="hint" id="hint">Cargando…</span>
</div>
<div id="content"></div>

<script>
function esc(s){ return String(s??'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

var params = new URLSearchParams(location.search);
var quoteId = params.get('id');
var productId = params.get('pid');
var content = document.getElementById('content');
var hint = document.getElementById('hint');

if(!quoteId || !productId){
  content.innerHTML = '<div class="errbox">Faltan parámetros.</div>';
} else {
  fetch('/api/quotes/' + quoteId).then(function(r){
    if(!r.ok) throw new Error('No se encontró la cotización');
    return r.json();
  }).then(function(q){ render(q); })
    .catch(function(e){ content.innerHTML = '<div class="errbox">'+esc(e.message)+'</div>'; hint.textContent=''; });
}

function render(q){
  var s = q.settings || {};
  var item = (q.items || []).find(function(it){ return String(it.product_id) === String(productId); }) || (q.items || [])[0] || {};
  hint.textContent = 'Anexo — Cotización ' + q.number;

  content.innerHTML = ''
  + '<div class="sheet premium">'
  + (s.logo_path ? '<div class="page-watermark"><img src="'+esc(s.logo_path)+'"></div>' : '')
  + '  <div class="premium-topbar">'
  + (s.logo_path ? '<img class="logo" src="'+esc(s.logo_path)+'">' : '')
  + '    <div class="brand">'+esc(s.company_name||'')+'<small>'+esc(s.company_web||'')+'</small></div>'
  + '    <div class="accent-line"></div>'
  + '  </div>'
  + '  <div class="anexosheet"><div class="anexo-mid">'
  + '    <div class="kicker">Anexo técnico</div>'
  + '    <div class="rule"></div>'
  + '    <h1>Ficha técnica del fabricante</h1>'
  + '    <div class="item">'+esc(item.code ? item.code + ' — ' : '')+esc(item.description||'')+'</div>'
  + '    <div class="note">Documento oficial del fabricante, incluido a continuación sin modificaciones.</div>'
  + '  </div></div>'
  + '</div>';
  document.title = 'Anexo — Cotización ' + q.number;
}
</script>
</body>
</html>
